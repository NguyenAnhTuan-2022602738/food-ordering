server:
  port: 8084
spring:
  application:
    name: service-payment
  datasource:
    url: jdbc:postgresql://localhost:5435/food_ordering_payment
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
logging:
  pattern:
    console: "[%d{yyyy-MM-dd HH:mm:ss}] [%level] [PAYMENT-SERVICE] %msg%n"
