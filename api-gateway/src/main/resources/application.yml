server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Auth Service Routes
        - id: service-auth
          uri: lb://service-auth
          predicates:
            - Path=/api/auth/**, /api/users/**
          filters:
            - StripPrefix=1

        # Menu Service Routes
        - id: service-menu
          uri: lb://service-menu
          predicates:
            - Path=/api/menu/**, /api/categories/**
          filters:
            - StripPrefix=1

        # Order Service Routes
        - id: service-order
          uri: lb://service-order
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1

        # Inventory Service Routes
        - id: service-inventory
          uri: lb://service-inventory
          predicates:
            - Path=/api/inventory/**, /api/ingredients/**, /api/recipes/**
          filters:
            - StripPrefix=1

        # Payment Service Routes
        - id: service-payment
          uri: lb://service-payment
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1

        # Notification Service Routes
        - id: service-notification
          uri: lb://service-notification
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1


        # Socket Service Routes
        - id: service-socket
          uri: lb://service-socket
          predicates:
            - Path=/ws/**
          filters:
            - StripPrefix=0
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

      # Global CORS Configuration
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:3001"
              - "http://localhost:3002"
              - "http://localhost:3003"
              - "http://localhost:3004"
              - "http://localhost:3005"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO
  pattern:
    console: "[%d{yyyy-MM-dd HH:mm:ss}] [%level] [API-GATEWAY] [%X{traceId}] %msg%n"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
